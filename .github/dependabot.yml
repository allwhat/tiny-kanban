# Dependabot configuration for automatic dependency updates
# Documentation: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Frontend npm dependencies
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "15:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "npm"
      include: "scope"
    # Ignore ESLint 10.x until eslint-plugin-react-hooks supports it
    # Ignore TypeScript 6.x until typescript-eslint supports it
    ignore:
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
        versions: ["10.x"]
      - dependency-name: "@eslint/js"
        update-types: ["version-update:semver-major"]
        versions: ["10.x"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
        versions: ["6.x"]
    # Single group: batch all updates (dev + prod, all semver levels) into one PR
    groups:
      npm-dependencies:
        patterns:
          - "*"
        update-types:
          - "major"
          - "minor"
          - "patch"

  # Backend Python dependencies
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "15:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "backend"
      - "python"
    commit-message:
      prefix: "pip"
      include: "scope"
    # Single group: batch all updates (dev + prod, all semver levels) into one PR
    groups:
      pip-dependencies:
        patterns:
          - "*"
        update-types:
          - "major"
          - "minor"
          - "patch"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "15:00"
      timezone: "Europe/Paris"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
    # Single group: batch all action bumps into one PR
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "major"
          - "minor"
          - "patch"
