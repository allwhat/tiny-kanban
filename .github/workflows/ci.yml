name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read
  id-token: write

jobs:
  test-and-lint:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        # Future: Add other Linux distributions here
        # os: [ubuntu-latest, ubuntu-22.04, ubuntu-20.04]

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    # Setup Python for backend
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: 'backend/pyproject.toml'

    # Setup Node.js for frontend
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Set up PackageMaze CLI
      uses: packagemaze/setup-maze@v0.0.1

    - name: Get PackageMaze npm install token
      id: packagemaze-npm-token
      run: maze auth exchange-oidc --feed packagemaze/npm-smoke-test --purpose install --format github-output

    - name: Get PackageMaze PyPI install token
      id: packagemaze-pypi-token
      run: maze auth exchange-oidc --feed packagemaze/pypi-smoke-test --purpose install --format github-output

    # Backend: Install dependencies
    - name: Install backend dependencies
      env:
        PIP_INDEX_URL: "https://__token__:${{ steps.packagemaze-pypi-token.outputs.token }}@pkg.packagemaze.com/packagemaze/pypi-smoke-test"
      run: |
        cd backend
        pip install -e ".[dev]"

    - name: Verify PackageMaze PyPI readback
      env:
        PACKAGE_MAZE_PYPI_PACKAGE: pm-smoke-pypi-1782010652-c33184-twine-wheel-setuptools-publish-then-install
        PACKAGE_MAZE_PYPI_MODULE: pm_smoke_pypi_1782010652_c33184_twine_wheel_setuptools_publish_then_install
        PACKAGE_MAZE_PYPI_VERSION: 1.0.0
        PIP_INDEX_URL: "https://__token__:${{ steps.packagemaze-pypi-token.outputs.token }}@pkg.packagemaze.com/packagemaze/pypi-smoke-test"
      run: |
        python -m venv "$RUNNER_TEMP/packagemaze-pypi-consumer"
        "$RUNNER_TEMP/packagemaze-pypi-consumer/bin/python" -m pip install \
          "${PACKAGE_MAZE_PYPI_PACKAGE}==${PACKAGE_MAZE_PYPI_VERSION}"
        "$RUNNER_TEMP/packagemaze-pypi-consumer/bin/python" - <<'PY'
        import importlib
        import os

        package = importlib.import_module(os.environ["PACKAGE_MAZE_PYPI_MODULE"])
        assert package.ping()
        print(f"PackageMaze PyPI readback: {os.environ['PACKAGE_MAZE_PYPI_PACKAGE']}")
        PY

    # Frontend: Install dependencies
    - name: Install frontend dependencies
      env:
        MAZE_TOKEN: ${{ steps.packagemaze-npm-token.outputs.token }}
      run: |
        cd frontend
        npm ci

    - name: Verify PackageMaze npm readback
      env:
        NODE_AUTH_TOKEN: ${{ steps.packagemaze-npm-token.outputs.token }}
        PACKAGE_MAZE_NPM_PACKAGE: pm-smoke-npm-1782010647-c17fe9-npm11-commonjs-publish-install-download
        PACKAGE_MAZE_NPM_REGISTRY: https://pkg.packagemaze.com/packagemaze/npm-smoke-test/
        PACKAGE_MAZE_NPM_VERSION: 1.0.0
      run: |
        rm -rf "$RUNNER_TEMP/packagemaze-npm-consumer"
        mkdir -p "$RUNNER_TEMP/packagemaze-npm-consumer"
        cd "$RUNNER_TEMP/packagemaze-npm-consumer"
        {
          printf 'registry=%s\n' "$PACKAGE_MAZE_NPM_REGISTRY"
          printf '//pkg.packagemaze.com/packagemaze/npm-smoke-test/:_authToken=${NODE_AUTH_TOKEN}\n'
          printf 'always-auth=true\n'
        } > .npmrc
        npm init -y
        npm install "${PACKAGE_MAZE_NPM_PACKAGE}@${PACKAGE_MAZE_NPM_VERSION}" --ignore-scripts --no-audit --fund=false
        node - <<'JS'
        const installed = require(process.env.PACKAGE_MAZE_NPM_PACKAGE);
        if (installed.smoke !== "alpha") {
          throw new Error(`Unexpected PackageMaze npm readback: ${JSON.stringify(installed)}`);
        }
        console.log(`PackageMaze npm readback: ${process.env.PACKAGE_MAZE_NPM_PACKAGE}`);
        JS

    # Backend: Run tests
    - name: Run backend tests
      run: |
        cd backend
        pytest -v

    # Frontend: Run tests
    - name: Run frontend tests
      env:
        MAZE_TOKEN: ${{ steps.packagemaze-npm-token.outputs.token }}
      run: |
        cd frontend
        npx vitest run

    # Backend: Check code formatting with Black
    - name: Check backend formatting (Black)
      run: |
        cd backend
        black --check --diff app/ tests/

    # Backend: Lint with pyflakes
    - name: Lint backend (pyflakes)
      run: |
        cd backend
        pyflakes app/ tests/

    # Frontend: Check code formatting with Prettier
    - name: Check frontend formatting (Prettier)
      env:
        MAZE_TOKEN: ${{ steps.packagemaze-npm-token.outputs.token }}
      run: |
        cd frontend
        npx prettier --check 'src/**/*.{ts,tsx,css}'

    # Frontend: Lint with ESLint
    - name: Lint frontend (ESLint)
      env:
        MAZE_TOKEN: ${{ steps.packagemaze-npm-token.outputs.token }}
      run: |
        cd frontend
        npx eslint . --max-warnings 0
