name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      runner:
        description: Runner pool for manual install checks.
        required: true
        type: choice
        default: github-hosted
        options:
          - github-hosted
          - local

permissions:
  contents: read
  id-token: write

jobs:
  package-install:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.runner == 'github-hosted' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          package-manager-cache: false

      - name: Set up PackageMaze CLI
        uses: packagemaze/setup-maze@v0.0.1

      - name: Exchange PackageMaze PyPI install token
        id: packagemaze-pypi-token
        run: maze auth exchange-oidc --feed packagemaze/pypi-smoke-test --purpose install --format github-output

      - name: Exchange PackageMaze npm install token
        id: packagemaze-npm-token
        run: maze auth exchange-oidc --feed packagemaze/npm-smoke-test --purpose install --format github-output

      - name: Install backend dependencies
        env:
          PIP_EXTRA_INDEX_URL: ""
          PIP_INDEX_URL: https://__token__:${{ steps.packagemaze-pypi-token.outputs.token }}@pkg.packagemaze.com/packagemaze/pypi-smoke-test/simple/
        run: |
          cd backend
          pip install -e ".[dev]"

      - name: Install frontend dependencies
        env:
          MAZE_TOKEN: ${{ steps.packagemaze-npm-token.outputs.token }}
        run: |
          cd frontend
          npm ci

  package-install-local:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.runner == 'local' }}
    runs-on: [self-hosted, Linux, ARM64, packagemaze-linux-local]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          package-manager-cache: false

      - name: Set up PackageMaze CLI
        uses: packagemaze/setup-maze@v0.0.1

      - name: Exchange PackageMaze PyPI install token
        id: packagemaze-pypi-token
        run: maze auth exchange-oidc --feed packagemaze/pypi-smoke-test --purpose install --format github-output

      - name: Exchange PackageMaze npm install token
        id: packagemaze-npm-token
        run: maze auth exchange-oidc --feed packagemaze/npm-smoke-test --purpose install --format github-output

      - name: Install backend dependencies
        env:
          PIP_EXTRA_INDEX_URL: ""
          PIP_INDEX_URL: https://__token__:${{ steps.packagemaze-pypi-token.outputs.token }}@pkg.packagemaze.com/packagemaze/pypi-smoke-test/simple/
        run: |
          cd backend
          pip install -e ".[dev]"

      - name: Install frontend dependencies
        env:
          MAZE_TOKEN: ${{ steps.packagemaze-npm-token.outputs.token }}
        run: |
          cd frontend
          npm ci
