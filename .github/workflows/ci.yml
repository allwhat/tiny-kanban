name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      runner:
        description: Runner pool for manual install checks.
        required: true
        type: choice
        default: local
        options:
          - local
          - github-hosted

permissions:
  contents: read

jobs:
  package-install:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.runner == 'local' }}
    runs-on: [self-hosted, Linux, ARM64, packagemaze-linux-local]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          package-manager-cache: false

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -e ".[dev]"

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

  package-install-github-hosted:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.runner == 'github-hosted' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          package-manager-cache: false

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -e ".[dev]"

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci
