name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read
  id-token: write

jobs:
  test-and-lint:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        # Future: Add other Linux distributions here
        # os: [ubuntu-latest, ubuntu-22.04, ubuntu-20.04]

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    # Setup Python for backend
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: 'backend/pyproject.toml'

    # Setup Node.js for frontend
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Set up PackageMaze CLI
      uses: packagemaze/setup-maze@v0.0.1

    - name: Exchange PackageMaze npm install token
      id: packagemaze-npm-token
      run: maze auth exchange-oidc --feed packagemaze/npm-smoke-test --purpose install --format github-output

    - name: Exchange PackageMaze PyPI install token
      id: packagemaze-pypi-token
      run: maze auth exchange-oidc --feed packagemaze/pypi-smoke-test --purpose install --format github-output

    # Backend: Install dependencies
    - name: Install backend dependencies
      env:
        PIP_INDEX_URL: "https://__token__:${{ steps.packagemaze-pypi-token.outputs.token }}@pkg.packagemaze.com/packagemaze/pypi-smoke-test"
      run: |
        cd backend
        pip install -e ".[dev]"

    - name: Verify PackageMaze PyPI readback
      env:
        PIP_INDEX_URL: "https://__token__:${{ steps.packagemaze-pypi-token.outputs.token }}@pkg.packagemaze.com/packagemaze/pypi-smoke-test"
      run: |
        cd backend
        python -m pip download --no-cache-dir --no-deps --dest "$RUNNER_TEMP/packagemaze-pypi-readback" fastapi==0.136.3
        python - <<'PY'
        import fastapi

        print(f"PackageMaze PyPI readback: fastapi {fastapi.__version__}")
        PY

    # Frontend: Install dependencies
    - name: Install frontend dependencies
      env:
        MAZE_TOKEN: ${{ steps.packagemaze-npm-token.outputs.token }}
      run: |
        cd frontend
        npm ci

    - name: Verify PackageMaze npm readback
      env:
        MAZE_TOKEN: ${{ steps.packagemaze-npm-token.outputs.token }}
      run: |
        cd frontend
        react_version="$(node -p "require('./node_modules/react/package.json').version")"
        npm view "react@$react_version" version --registry=https://pkg.packagemaze.com/packagemaze/npm-smoke-test/
        printf 'PackageMaze npm readback: react %s\n' "$react_version"

    # Backend: Run tests
    - name: Run backend tests
      run: |
        cd backend
        pytest -v

    # Frontend: Run tests
    - name: Run frontend tests
      env:
        MAZE_TOKEN: ${{ steps.packagemaze-npm-token.outputs.token }}
      run: |
        cd frontend
        npx vitest run

    # Backend: Check code formatting with Black
    - name: Check backend formatting (Black)
      run: |
        cd backend
        black --check --diff app/ tests/

    # Backend: Lint with pyflakes
    - name: Lint backend (pyflakes)
      run: |
        cd backend
        pyflakes app/ tests/

    # Frontend: Check code formatting with Prettier
    - name: Check frontend formatting (Prettier)
      env:
        MAZE_TOKEN: ${{ steps.packagemaze-npm-token.outputs.token }}
      run: |
        cd frontend
        npx prettier --check 'src/**/*.{ts,tsx,css}'

    # Frontend: Lint with ESLint
    - name: Lint frontend (ESLint)
      env:
        MAZE_TOKEN: ${{ steps.packagemaze-npm-token.outputs.token }}
      run: |
        cd frontend
        npx eslint . --max-warnings 0
